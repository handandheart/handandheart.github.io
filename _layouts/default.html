<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="site-brand" href="{{ '/' | relative_url }}">
          <span class="site-brand-mark">H</span>
          <span class="site-brand-copy">
            <strong>{{ site.title }}</strong>
            <em>{{ site.tagline | default: site.description }}</em>
          </span>
        </a>
        <nav class="site-nav" aria-label="主导航">
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/about/' | relative_url }}">关于</a>
        </nav>
      </header>

      <main class="page-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>{{ site.title }} · {{ "now" | date: "%Y" }}</p>
      </footer>
    </div>
  </body>
  </html>
