---
layout: default
---

<article class="post-detail">
  <header class="content-header">
    <p class="eyebrow">Post</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%Y.%m.%d" }}{% if page.categories and page.categories != empty %} · {{ page.categories | join: ", " }}{% endif %}</p>
  </header>
  <div class="content-body">
    {{ content }}
  </div>
</article>
